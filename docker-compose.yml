services:
  nginx:
    build: ./nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      wordpress:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
        required: false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/health | grep -q '\"postgres\":\"ok\"'",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 60s
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        BUILD_ID: ${BUILD_ID:-dev}
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      INTERNAL_API_URL: http://backend:8080
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/dashboard >/dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  wordpress:
    build: ./wordpress
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - wp_uploads:/var/www/html
    expose:
      - "80"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${WP_DB_NAME}
      MYSQL_USER: ${WP_DB_USER}
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    command: ["mysqld", "--mysql-native-password=ON"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    profiles: ["dev"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "pgrep minio >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "9000"
      - "9001"
    restart: unless-stopped

  minio-init:
    profiles: ["dev"]
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      sleep 2 &&
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      exit 0
      "
    restart: "no"

  # nats:
  #   image: nats:2-alpine
  # dragonfly:
  #   image: docker.dragonflydb.io/dragonflydb/dragonfly

volumes:
  postgres_data:
  mysql_data:
  wp_uploads:
  minio_data:
