# Dev HTTP config for local docker compose.
# Production HTTPS: copy conf.d/https.conf.sample to https.conf after ssl-init.sh

server {
    listen 80;
    server_name asutport.ru www.asutport.ru _;

    client_max_body_size 100M;
    resolver 127.0.0.11 valid=5s ipv6=off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        include /etc/nginx/includes/proxy-base.conf;
        include /etc/nginx/includes/proxy-api.conf;
    }

    location = /health {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    location /_next/ {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        include /etc/nginx/includes/proxy-base.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /app {
        return 302 /app/login;
    }

    location = /app/ {
        return 302 /app/login;
    }

    location = /app/db {
        return 301 /app/db/;
    }

    location /app/db/ {
        auth_basic "ASUTPORT database";
        auth_basic_user_file /etc/nginx/auth/adminer.htpasswd;

        set $adminer_upstream http://adminer:8080;
        rewrite ^/app/db/(.*)$ /$1 break;
        proxy_pass $adminer_upstream;
        proxy_redirect / /app/db/;
        include /etc/nginx/includes/proxy-base.conf;
    }

    location /app/ {
        set $frontend_upstream http://frontend:3000;
        rewrite ^/app/(.*)$ /$1 break;
        proxy_pass $frontend_upstream;
        include /etc/nginx/includes/proxy-base.conf;
    }

    location = /db {
        return 301 /app/db/;
    }

    location /db/ {
        return 301 /app/db/;
    }

    location /login {
        return 301 /app/login;
    }

    location /register {
        return 301 /app/register;
    }

    location /dashboard {
        return 301 /app/dashboard;
    }

    location /vendor {
        return 301 /app/vendor;
    }

    location /admin {
        return 301 /app/admin;
    }

    location /kb {
        return 301 /app/kb;
    }

    location /wp-admin/ {
        proxy_pass http://wordpress;
        include /etc/nginx/includes/proxy-base.conf;
    }

    location /wp-content/ {
        proxy_pass http://wordpress;
        include /etc/nginx/includes/proxy-base.conf;
    }

    location /wp-includes/ {
        proxy_pass http://wordpress;
        include /etc/nginx/includes/proxy-base.conf;
    }

    location /wp-json/ {
        proxy_pass http://wordpress;
        include /etc/nginx/includes/proxy-base.conf;
    }

    location = /wp-login.php {
        proxy_pass http://wordpress;
        include /etc/nginx/includes/proxy-base.conf;
    }

    location / {
        proxy_pass http://wordpress;
        include /etc/nginx/includes/proxy-base.conf;
    }
}
